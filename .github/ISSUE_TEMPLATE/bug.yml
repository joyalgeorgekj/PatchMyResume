name: "🐛 Bug Report"
description: "Report a reproducible issue or unexpected behavior in the application."
title: "[BUG]: "
labels: ["type:bug", "status:triage", "priority:high"]
assignees: ["Joyal-George-KJ"]
body:
  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate Check
      description: Have you searched our existing issues to ensure this is not a duplicate?
      options:
        - label: I have checked the existing issues and this is not a duplicate.
          required: true

  - type: markdown
    attributes:
      value: |
        Thank you for helping us squash bugs! Please fill out the sections below as completely as possible.

  - type: textarea
    id: bug-description
    attributes:
      label: 📝 Describe the Bug (REQUIRED)
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 🔄 To Reproduce (REQUIRED)
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to ...
        2. Click on ....
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: ✅ Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 💻 Environment/Device
      description: |
        Example: OS (Windows, macOS, Android), Browser (Chrome, Firefox), and App Version (if known).
      placeholder: Chrome 125 on macOS Sonoma
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 🖼️ Screenshots or Context
      description: |
        If applicable, add screenshots or error logs to help explain your problem.
    validations:
      required: false

